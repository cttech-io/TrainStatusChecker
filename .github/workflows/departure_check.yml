name: Departure Check

on:
  workflow_dispatch:
    inputs:
      from_crs:
        description: 'Departure station CRS code (e.g. LST)'
        required: true
        default: 'LST'
      to_crs:
        description: 'Destination station CRS code (e.g. BIS)'
        required: true
        default: 'BIS'
      from_name:
        description: 'Departure station name'
        required: false
        default: 'London Liverpool Street'
      to_name:
        description: 'Destination station name'
        required: false
        default: 'Bishops Stortford'
  repository_dispatch:
    types: [departure-check]

concurrency:
  group: departure-check
  cancel-in-progress: true

jobs:
  check-departures:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check departures
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RTT_REFRESH_TOKEN: ${{ secrets.RTT_REFRESH_TOKEN }}
          FROM_CRS: ${{ github.event.inputs.from_crs || github.event.client_payload.from_crs }}
          TO_CRS: ${{ github.event.inputs.to_crs || github.event.client_payload.to_crs }}
          FROM_NAME: ${{ github.event.inputs.from_name || github.event.client_payload.from_name || '' }}
          TO_NAME: ${{ github.event.inputs.to_name || github.event.client_payload.to_name || '' }}
        run: python3 departure_check.py

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ Departure Check failed\",\"description\":\"The departure check workflow encountered an error and did not complete. [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"color\":15158332}]}"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
