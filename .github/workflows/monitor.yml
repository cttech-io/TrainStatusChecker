name: Monitor Train Status

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      routes:
        description: 'Comma-separated routes as FROM:TO CRS pairs (e.g. LST:BIS,LST:CBG)'
        required: false
        default: 'LST:BIS'

concurrency:
  group: train-status-monitor
  cancel-in-progress: false

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Get date for cache key
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore disruption state cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: state.json
          key: train-status-state-${{ steps.date.outputs.today }}-${{ github.run_id }}
          restore-keys: |
            train-status-state-${{ steps.date.outputs.today }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run status checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RTT_REFRESH_TOKEN: ${{ secrets.RTT_REFRESH_TOKEN }}
          ROUTES: ${{ github.event.inputs.routes || vars.ROUTES || 'LST:BIS' }}
          OPERATOR_CODES: ${{ vars.OPERATOR_CODES || 'LE,SX' }}
          NOTIFY_ALWAYS: ${{ github.event_name == 'workflow_dispatch' }}
        run: python3 train_status.py

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ Train Status Monitor failed\",\"description\":\"The monitor workflow encountered an error and did not complete. [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"color\":15158332}]}"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
