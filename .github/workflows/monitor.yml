name: Monitor Train Status

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      operators:
        description: 'Comma-separated list of train operators'
        required: false
        default: 'Stansted Express,Cambridge'

concurrency:
  group: train-status-monitor
  cancel-in-progress: false

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run status checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TRAIN_OPERATORS: ${{ github.event.inputs.operators || vars.TRAIN_OPERATORS || 'Stansted Express,Cambridge' }}
          NOTIFY_ALWAYS: ${{ github.event_name == 'workflow_dispatch' }}
        run: python3 train_status.py
