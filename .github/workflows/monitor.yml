name: Monitor Train Status

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      routes:
        description: 'Comma-separated routes as FROM:TO CRS pairs (e.g. LST:BIS,LST:CBG)'
        required: false
        default: 'LST:BIS'

concurrency:
  group: train-status-monitor
  cancel-in-progress: false

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run status checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RTT_REFRESH_TOKEN: ${{ secrets.RTT_REFRESH_TOKEN }}
          ROUTES: ${{ github.event.inputs.routes || vars.ROUTES || 'LST:BIS' }}
          NOTIFY_ALWAYS: ${{ github.event_name == 'workflow_dispatch' }}
        run: python3 train_status.py
  debug-disruptions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: pip install requests beautifulsoup4
      - run: python3 fetch_disruptions_debug.py
